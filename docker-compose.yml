version: '3.8'

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data:

services:
  db:
    image: mysql:8.0
    container_name: sakila-db1
    restart: unless-stopped
    networks:
      - sakila-network
    volumes:
      - sakila-db-data:/var/lib/mysql
      - ./sakila-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sakila-data.sql:/docker-entrypoint-initdb.d/02-data.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-app1
    restart: on-failure:5
    networks:
      - sakila-network
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy

  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    restart: unless-stopped
    networks:
      - sakila-network
    ports:
      - "8080:8080"
    depends_on:
      - db

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-tests
    networks:
      - sakila-network
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    command: python -m pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test